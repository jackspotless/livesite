# Netlify configuration for Spotless House Cleaning
# Static site deploy with form handling and pretty URLs

[build]
  publish = "."

# ---------- Pretty URLs ----------
# Force-redirect any legacy .html URL to its extensionless canonical version.
# This handles bookmarks, old sitemap entries, and any external links pointing
# at the .html versions — they all 301 to the canonical extensionless URL.
# The catch-all rule covers every page in one entry.

[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# ---------- Hub page trailing slashes ----------
# Directory index pages should canonicalize to the trailing-slash version.

[[redirects]]
  from = "/services"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/service-areas"
  to = "/service-areas/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

# ---------- Headers ----------

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
